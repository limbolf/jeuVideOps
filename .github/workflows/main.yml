name: FirstWorkflow
on:
  push:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  check-all-good:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jeuVideOps
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
      - run: npm install
      - run: npm audit
